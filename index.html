function EquityChart({ data, color }) {
  const W = 320, H = 160, pad = 8;
  if (!data || data.length < 2) return null;
  const ys = data.map((d) => d.equity);
  let min = Math.min(...ys, 0), max = Math.max(...ys, 0);
  if (min === max) max = min + 1;
  const n = data.length;
  const xAt = (i) => pad + (i / (n - 1)) * (W - 2 * pad);
  const yAt = (v) => pad + (1 - (v - min) / (max - min)) * (H - 2 * pad);
  const line = data.map((d, i) => `${xAt(i)},${yAt(d.equity)}`).join(" ");
  const area = `${xAt(0)},${yAt(min)} ` + line + ` ${xAt(n - 1)},${yAt(min)}`;
  const zeroY = yAt(0);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" height="180" preserveAspectRatio="none" style={{ display: "block" }}>
      <defs>
        <linearGradient id="eqfill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.32" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <line x1={pad} y1={zeroY} x2={W - pad} y2={zeroY} stroke="#28313C" strokeWidth="1" strokeDasharray="3 3" vectorEffect="non-scaling-stroke" />
      <polygon points={area} fill="url(#eqfill)" />
      <polyline points={line} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" vectorEffect="non-scaling-stroke" />
    </svg>
  );
}



/* ---------- helpers ---------- */
const uid = () =>
  (typeof crypto !== "undefined" && crypto.randomUUID)
    ? crypto.randomUUID()
    : Date.now().toString(36) + Math.random().toString(36).slice(2);

function nowLocalISO() {
  const d = new Date();
  const local = new Date(d.getTime() - d.getTimezoneOffset() * 60000);
  return local.toISOString().slice(0, 16);
}

function fmtMoney(v) {
  if (v == null || isNaN(v)) return "—";
  const a = Math.abs(v).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return (v < 0 ? "-$" : "$") + a;
}
function fmtSigned(v) {
  if (v == null || isNaN(v)) return "—";
  return (v > 0 ? "+" : "") + fmtMoney(v);
}
function fmtPct(v) {
  if (v == null || isNaN(v)) return "—";
  return (v > 0 ? "+" : "") + v.toFixed(2) + "%";
}
function fmtPrice(p) {
  if (p == null || isNaN(p)) return "—";
  const n = Number(p);
  if (n >= 1000) return n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  if (n >= 1) return n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 4 });
  if (n > 0) return n.toLocaleString(undefined, { maximumFractionDigits: 8 });
  return "0";
}
function fmtDate(s) {
  if (!s) return "—";
  const d = new Date(s);
  if (isNaN(d.getTime())) return "—";
  const p = (n) => String(n).padStart(2, "0");
  return `${p(d.getDate())}/${p(d.getMonth() + 1)}/${String(d.getFullYear()).slice(2)} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function computeTrade(t) {
  const entry = parseFloat(t.entryPrice);
  const exit = parseFloat(t.exitPrice);
  const margin = parseFloat(t.margin) || 0;
  const lev = parseFloat(t.leverage) || 1;
  const fees = parseFloat(t.fees) || 0;
  const dir = t.direction === "short" ? -1 : 1;
  if (isNaN(entry) || isNaN(exit) || entry <= 0) {
    return { notional: 0, qty: 0, gross: 0, net: -fees, roi: 0, R: null, valid: false };
  }
  const notional = margin * lev;
  const qty = notional / entry;
  const gross = (exit - entry) * qty * dir;
  const net = gross - fees;
  const roi = margin > 0 ? (net / margin) * 100 : 0;
  let R = null;
  const sl = parseFloat(t.stopLoss);
  if (!isNaN(sl) && sl > 0) {
    const risk = Math.abs(entry - sl) * qty;
    if (risk > 0) R = net / risk;
  }
  return { notional, qty, gross, net, roi, R, valid: true };
}

function dayName(s) {
  const d = new Date(s);
  if (isNaN(d.getTime())) return "ไม่ระบุ";
  return ["อาทิตย์", "จันทร์", "อังคาร", "พุธ", "พฤหัส", "ศุกร์", "เสาร์"][d.getDay()];
}
function holdMs(t) {
  if (!t.entryDate || !t.exitDate) return null;
  const a = new Date(t.entryDate).getTime(), b = new Date(t.exitDate).getTime();
  if (isNaN(a) || isNaN(b) || b < a) return null;
  return b - a;
}
function fmtDuration(ms) {
  if (ms == null) return "—";
  const m = Math.round(ms / 60000);
  if (m < 60) return m + " นาที";
  const h = m / 60;
  if (h < 24) return (Math.round(h * 10) / 10) + " ชม.";
  return (Math.round((h / 24) * 10) / 10) + " วัน";
}
function breakdownBy(rows, keyFn) {
  const map = new Map();
  rows.forEach(({ t, c }) => {
    const k = keyFn(t) || "ไม่ระบุ";
    if (!map.has(k)) map.set(k, { key: k, count: 0, wins: 0, pnl: 0, rSum: 0, rCount: 0 });
    const g = map.get(k);
    g.count++; g.pnl += c.net;
    if (c.net > 0) g.wins++;
    if (c.R != null) { g.rSum += c.R; g.rCount++; }
  });
  return [...map.values()].map((g) => ({
    ...g,
    winRate: g.count ? (g.wins / g.count) * 100 : 0,
    avgR: g.rCount ? g.rSum / g.rCount : null,
  })).sort((a, b) => b.pnl - a.pnl);
}

/* ---------- main ---------- */
function CryptoTradingJournal() {
  const [trades, setTrades] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("trades");
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState(emptyForm());
  const [expanded, setExpanded] = useState(null);
  const [menuOpen, setMenuOpen] = useState(false);
  const [confirmClear, setConfirmClear] = useState(false);
  const [delConfirm, setDelConfirm] = useState(null);
  const [toast, setToast] = useState(null);
  const [search, setSearch] = useState("");
  const [resultFilter, setResultFilter] = useState("all");
  const [sortBy, setSortBy] = useState("recent");
  const [startCapital, setStartCapital] = useState(0);
  const [capInput, setCapInput] = useState("");

  useEffect(() => {
    let on = true;
    (() => {
      const t = lsGet("journal:trades");
      if (on && Array.isArray(t)) setTrades(t);
      const s = lsGet("journal:settings");
      if (on && s && s.startCapital != null) { setStartCapital(s.startCapital); setCapInput(String(s.startCapital)); }
      if (on) setLoading(false);
    })();
    return () => { on = false; };
  }, []);

  function persist(next) {
    setTrades(next);
    if (!lsSet("journal:trades", next)) flash("บันทึกไม่สำเร็จ ลองอีกครั้ง");
  }

  function flash(msg) {
    setToast(msg);
    setTimeout(() => setToast(null), 2600);
  }

  function persistSettings(next) {
    lsSet("journal:settings", next);
  }
  function commitCapital() {
    const v = parseFloat(capInput) || 0;
    setStartCapital(v);
    persistSettings({ startCapital: v });
    flash("ตั้งทุนเริ่มต้นแล้ว");
  }

  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));

  function openAdd() {
    setForm(emptyForm());
    setEditing(null);
    setShowForm(true);
  }
  function openEdit(t) {
    setForm({ ...emptyForm(), ...t });
    setEditing(t);
    setShowForm(true);
  }
  function closeForm() {
    setShowForm(false);
    setEditing(null);
  }

  const live = computeTrade({
    ...form,
    leverage: form.type === "spot" ? "1" : form.leverage,
    direction: form.type === "spot" ? "long" : form.direction,
  });
  const valid =
    form.pair.trim() &&
    parseFloat(form.entryPrice) > 0 &&
    parseFloat(form.exitPrice) > 0 &&
    parseFloat(form.margin) > 0 &&
    (form.type === "spot" || parseFloat(form.leverage) > 0);

  function save() {
    if (!valid) return;
    const t = {
      ...form,
      pair: form.pair.trim().toUpperCase(),
      leverage: form.type === "spot" ? "1" : form.leverage,
      direction: form.type === "spot" ? "long" : form.direction,
      id: editing ? editing.id : uid(),
      createdAt: editing ? editing.createdAt : Date.now(),
      updatedAt: Date.now(),
    };
    const next = editing ? trades.map((x) => (x.id === t.id ? t : x)) : [...trades, t];
    persist(next);
    closeForm();
    flash(editing ? "อัปเดตเทรดแล้ว" : "เพิ่มเทรดแล้ว");
  }

  function removeTrade(id) {
    persist(trades.filter((x) => x.id !== id));
    setDelConfirm(null);
    setExpanded(null);
    flash("ลบเทรดแล้ว");
  }

  function exportCSV() {
    setMenuOpen(false);
    const head = ["pair", "type", "direction", "leverage", "margin", "entry", "exit", "stopLoss", "takeProfit", "fees", "netPnL", "roi%", "R", "entryDate", "exitDate", "strategy", "market", "emotion", "followedPlan", "reason", "notes"];
    const lines = [head.join(",")];
    trades.forEach((t) => {
      const c = computeTrade(t);
      const row = [t.pair, t.type, t.direction, t.leverage, t.margin, t.entryPrice, t.exitPrice, t.stopLoss, t.takeProfit, t.fees, c.net.toFixed(2), c.roi.toFixed(2), c.R == null ? "" : c.R.toFixed(2), t.entryDate, t.exitDate, t.strategy, t.market, t.emotion, t.followedPlan, t.reason, t.notes]
        .map((v) => `"${String(v ?? "").replace(/"/g, '""')}"`).join(",");
      lines.push(row);
    });
    try {
      const blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "crypto-trading-journal.csv"; a.click();
      URL.revokeObjectURL(url);
    } catch (e) { flash("ส่งออกไม่สำเร็จ"); }
  }

  const rows = useMemo(() => trades.map((t) => ({ t, c: computeTrade(t) })), [trades]);

  const stats = useMemo(() => {
    const n = rows.length;
    let totalPnl = 0, grossWin = 0, grossLoss = 0, winCount = 0, lossCount = 0,
      planCount = 0, fees = 0, rSum = 0, rCount = 0, best = null, worst = null;
    rows.forEach(({ t, c }) => {
      totalPnl += c.net;
      fees += parseFloat(t.fees) || 0;
      if (c.net > 0) { winCount++; grossWin += c.net; }
      else if (c.net < 0) { lossCount++; grossLoss += Math.abs(c.net); }
      if (t.followedPlan) planCount++;
      if (c.R != null) { rSum += c.R; rCount++; }
      if (best === null || c.net > best.c.net) best = { t, c };
      if (worst === null || c.net < worst.c.net) worst = { t, c };
    });
    return {
      n, totalPnl,
      winRate: n ? (winCount / n) * 100 : 0,
      winCount, lossCount,
      avgWin: winCount ? grossWin / winCount : 0,
      avgLoss: lossCount ? grossLoss / lossCount : 0,
      pf: grossLoss > 0 ? grossWin / grossLoss : grossWin > 0 ? Infinity : 0,
      avgR: rCount ? rSum / rCount : null,
      planRate: n ? (planCount / n) * 100 : 0,
      fees, best, worst,
    };
  }, [rows]);

  const equity = useMemo(() => {
    const sorted = [...rows].sort((a, b) => {
      const da = a.t.exitDate ? new Date(a.t.exitDate).getTime() : a.t.createdAt || 0;
      const db = b.t.exitDate ? new Date(b.t.exitDate).getTime() : b.t.createdAt || 0;
      return da - db;
    });
    let cum = 0;
    const arr = [{ x: 0, equity: 0, label: "" }];
    sorted.forEach((r, i) => { cum += r.c.net; arr.push({ x: i + 1, equity: cum, label: r.t.pair, net: r.c.net }); });
    return arr;
  }, [rows]);

  const displayTrades = useMemo(() => {
    const q = search.trim().toLowerCase();
    const arr = rows.filter(({ t, c }) => {
      if (q && !t.pair.toLowerCase().includes(q)) return false;
      if (resultFilter === "win" && !(c.net > 0)) return false;
      if (resultFilter === "loss" && !(c.net < 0)) return false;
      return true;
    });
    return [...arr].sort((a, b) => {
      if (sortBy === "pnl") return b.c.net - a.c.net;
      if (sortBy === "roi") return b.c.roi - a.c.roi;
      const da = a.t.exitDate ? new Date(a.t.exitDate).getTime() : a.t.createdAt || 0;
      const db = b.t.exitDate ? new Date(b.t.exitDate).getTime() : b.t.createdAt || 0;
      return db - da;
    });
  }, [rows, search, resultFilter, sortBy]);

  const risk = useMemo(() => {
    const ordered = [...rows].sort((a, b) => {
      const da = a.t.exitDate ? new Date(a.t.exitDate).getTime() : a.t.createdAt || 0;
      const db = b.t.exitDate ? new Date(b.t.exitDate).getTime() : b.t.createdAt || 0;
      return da - db;
    });
    let peak = startCapital, maxDD = 0, maxDDpct = 0, cum = 0;
    let winStreak = 0, lossStreak = 0, curW = 0, curL = 0;
    let totalR = 0, rCount = 0, holdSum = 0, holdCount = 0;
    ordered.forEach((r) => {
      cum += r.c.net;
      const eq = startCapital + cum;
      if (eq > peak) peak = eq;
      const dd = peak - eq;
      if (dd > maxDD) { maxDD = dd; maxDDpct = peak > 0 ? (dd / peak) * 100 : 0; }
      if (r.c.net > 0) { curW++; curL = 0; if (curW > winStreak) winStreak = curW; }
      else if (r.c.net < 0) { curL++; curW = 0; if (curL > lossStreak) lossStreak = curL; }
      else { curW = 0; curL = 0; }
      if (r.c.R != null) { totalR += r.c.R; rCount++; }
      const h = holdMs(r.t); if (h != null) { holdSum += h; holdCount++; }
    });
    const n = ordered.length;
    return {
      maxDD, maxDDpct, winStreak, lossStreak,
      expectancy: n ? cum / n : 0,
      totalR: rCount ? totalR : null,
      avgHold: holdCount ? holdSum / holdCount : null,
      balance: startCapital + cum,
      accountReturnPct: startCapital > 0 ? (cum / startCapital) * 100 : null,
      n,
    };
  }, [rows, startCapital]);

  const breakdowns = useMemo(() => ({
    strategy: breakdownBy(rows, (t) => (t.strategy || "").trim() || "ไม่ระบุ"),

  const curveColor = equity.length && equity[equity.length - 1].equity >= 0 ? "#21C997" : "#F75A68";
  const totalClass = stats.totalPnl > 0 ? "t-green" : stats.totalPnl < 0 ? "t-red" : "t-mute";

            <div className="card" style={{ padding: 18, marginBottom: 14 }}>

              <div className={`mono ${totalClass}`} style={{ fontSize: 34, fontWeight: 700, lineHeight: 1.1, marginTop: 4 }}>

            {/* equity curve */}
            <div className="card" style={{ padding: "14px 8px 8px 8px", marginBottom: 14 }}>

                <div style={{ height: 180, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 10 }}>

                          </div>

                    </div>

                    <div className="t-mute" style={{ fontSize: 14 }}>เพิ่มเทรดเพื่อดูสถิติ</div>
                  </div>
                ) : (
                  <>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <Stat label="Win rate" value={stats.winRate.toFixed(1) + "%"} sub={`ชนะ ${stats.winCount} · แพ้ ${stats.lossCount}`} vClass={stats.winRate >= 50 ? "t-green" : "t-text"} />
                      <Stat label="Profit factor" value={stats.pf === Infinity ? "∞" : stats.pf.toFixed(2)} sub="กำไรรวม ÷ ขาดทุนรวม" vClass={stats.pf >= 1 ? "t-green" : "t-red"} />
                      <Stat label="กำไรเฉลี่ย/เทรด" value={fmtMoney(stats.avgWin)} vClass="t-green" />
                      <Stat label="ขาดทุนเฉลี่ย/เทรด" value={"-" + fmtMoney(stats.avgLoss)} vClass="t-red" />
                      <Stat label="เทรดที่ดีที่สุด" value={stats.best ? fmtSigned(stats.best.c.net) : "—"} sub={stats.best ? stats.best.t.pair : ""} vClass="t-green" />
                      <Stat label="เทรดที่แย่ที่สุด" value={stats.worst ? fmtSigned(stats.worst.c.net) : "—"} sub={stats.worst ? stats.worst.t.pair : ""} vClass="t-red" />
                      <Stat label="Avg R-multiple" value={stats.avgR == null ? "—" : (stats.avgR > 0 ? "+" : "") + stats.avgR.toFixed(2) + "R"} sub="กำไรเทียบความเสี่ยง" vClass={stats.avgR == null ? "" : stats.avgR >= 0 ? "t-green" : "t-red"} />
                      <Stat label="ทำตามแผน" value={stats.planRate.toFixed(0) + "%"} sub="วินัยการเทรด" vClass={stats.planRate >= 70 ? "t-green" : "t-text"} />
                    </div>
                    <div className="card" style={{ padding: 14, marginTop: 10, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span className="t-mute" style={{ fontSize: 12 }}>ค่าธรรมเนียม + Funding ที่จ่ายทั้งหมด</span>
                      <span className="mono t-red" style={{ fontSize: 14, fontWeight: 600 }}>-{fmtMoney(stats.fees)}</span>
                    </div>
                  </>

              </div>

            {tab === "insights" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                <div className="card" style={{ padding: 16 }}>
                  <div className="t-faint" style={{ fontSize: 11, letterSpacing: ".04em", textTransform: "uppercase", marginBottom: 10 }}>บัญชีทุน</div>
                  <div style={{ display: "flex", gap: 8, alignItems: "flex-end", marginBottom: startCapital > 0 ? 14 : 0 }}>
                    <div style={{ flex: 1 }}>
                      <div className="t-mute" style={{ fontSize: 12, marginBottom: 6 }}>ทุนเริ่มต้น (USD)</div>
                      <input className="inp mono" inputMode="decimal" placeholder="เช่น 1000" value={capInput} onChange={(e) => setCapInput(e.target.value)} />
                    </div>

                  </div>
                  {startCapital > 0 ? (
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <Stat label="ยอดปัจจุบัน" value={fmtMoney(risk.balance)} vClass={risk.balance >= startCapital ? "t-green" : "t-red"} />
                      <Stat label="ผลตอบแทนบัญชี" value={risk.accountReturnPct == null ? "—" : fmtPct(risk.accountReturnPct)} vClass={(risk.accountReturnPct || 0) >= 0 ? "t-green" : "t-red"} />

                    <div className="t-faint" style={{ fontSize: 12, marginTop: 10 }}>ใส่ทุนเริ่มต้นเพื่อดูยอดบัญชี ผลตอบแทน และ % drawdown</div>

                </div>

                {stats.n === 0 ? (
                  <div className="card" style={{ padding: 28, textAlign: "center" }}>
                    <div className="t-mute" style={{ fontSize: 14 }}>เพิ่มเทรดเพื่อดูการวิเคราะห์เชิงลึก</div>
                  </div>
                ) : (
                  <>
                    <div>
                      <SectionTitle icon={<Activity size={14} />} text="ความเสี่ยง & ความสม่ำเสมอ" />

                        <Stat label="Expectancy / เทรด" value={fmtSigned(risk.expectancy)} sub="กำไรคาดหวังต่อเทรด" vClass={risk.expectancy >= 0 ? "t-green" : "t-red"} />

                        <Stat label="Total R" value={risk.totalR == null ? "—" : (risk.totalR > 0 ? "+" : "") + risk.totalR.toFixed(1) + "R"} sub="ผลรวม R ที่ทำได้" vClass={risk.totalR == null ? "" : risk.totalR >= 0 ? "t-green" : "t-red"} />

                    <Breakdown title="ตามกลยุทธ์ / Setup" icon={<Target size={14} />} data={breakdowns.strategy} />

                  </>

          </>

      </div>

      {/* floating add */}
      {!loading && <button className="fab" onClick={openAdd} aria-label="เพิ่มเทรด"><Plus size={24} /></button>}

      {/* form sheet */}
      {showForm && (
        <div className="sheet-backdrop" onClick={(e) => { if (e.target === e.currentTarget) closeForm(); }}>
          <div className="sheet">
            <div className="sheet-head bd-b">

                  <input className="inp" type="datetime-local" value={form.entryDate} onChange={(e) => set("entryDate", e.target.value)} />

                  </select>
                </Labeled>
                <Labeled label="อารมณ์ตอนเทรด">
                  <select className="inp" value={form.emotion} onChange={(e) => set("emotion", e.target.value)}>
                    {EMOTIONS.map((m) => <option key={m.value} value={m.value}>{m.label}</option>)}
                  </select>
                </Labeled>
              </div>

              <Labeled label="ทำตามแผนที่วางไว้ไหม?">
                <Seg value={form.followedPlan} onChange={(v) => set("followedPlan", v)} options={[{ value: true, label: "ทำตามแผน", color: "#21C997" }, { value: false, label: "ไม่ได้ทำตามแผน", color: "#F75A68" }]} />
              </Labeled>

              <Labeled label="เหตุผลที่เข้า (Thesis)">
                <textarea className="inp" placeholder="ทำไมถึงคิดว่าจะไป?" value={form.reason} onChange={(e) => set("reason", e.target.value)} />
              </Labeled>

              <Labeled label="บทเรียน / สิ่งที่จะปรับ">
                <textarea className="inp" placeholder="อะไรดี อะไรพลาด ครั้งหน้าทำต่างยังไง" value={form.notes} onChange={(e) => set("notes", e.target.value)} />
              </Labeled>
            </div>

            <div className="sheet-foot bd-t">
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
                <div>
                  <div className="t-faint" style={{ fontSize: 11 }}>กำไร/ขาดทุนสุทธิ</div>
                  <div className={`mono ${valid ? (live.net > 0 ? "t-green" : live.net < 0 ? "t-red" : "t-mute") : "t-faint"}`} style={{ fontSize: 20, fontWeight: 700 }}>
                    {valid ? fmtSigned(live.net) : "—"}
                  </div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div className="t-faint" style={{ fontSize: 11 }}>ROI (ต่อ margin)</div>
                  <div className={`mono ${valid ? (live.roi > 0 ? "t-green" : live.roi < 0 ? "t-red" : "t-mute") : "t-faint"}`} style={{ fontSize: 20, fontWeight: 700 }}>
                    {valid ? fmtPct(live.roi) : "—"}
                  </div>
                </div>
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <button className="btn-ghost" style={{ flex: 1 }} onClick={closeForm}>ยกเลิก</button>
                <button className="btn-primary" style={{ flex: 2 }} onClick={save} disabled={!valid}>{editing ? "บันทึกการแก้ไข" : "บันทึกเทรด"}</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* clear all confirm */}
      {confirmClear && (
        <div className="sheet-backdrop" style={{ alignItems: "center" }} onClick={(e) => { if (e.target === e.currentTarget) setConfirmClear(false); }}>
          <div className="card" style={{ maxWidth: 360, width: "calc(100% - 32px)", padding: 22, textAlign: "center" }}>
            <AlertTriangle size={28} className="t-red" style={{ margin: "0 auto 12px" }} />
            <div style={{ fontWeight: 600, fontSize: 16, marginBottom: 6 }}>ลบข้อมูลทั้งหมด?</div>
            <div className="t-mute" style={{ fontSize: 13, marginBottom: 18 }}>เทรดทั้งหมด {trades.length} รายการจะถูกลบถาวร กู้คืนไม่ได้</div>
            <div style={{ display: "flex", gap: 10 }}>
              <button className="btn-ghost" style={{ flex: 1 }} onClick={() => setConfirmClear(false)}>ยกเลิก</button>
              <button className="btn-danger" style={{ flex: 1 }} onClick={() => { persist([]); setConfirmClear(false); flash("ลบข้อมูลทั้งหมดแล้ว"); }}>ลบทั้งหมด</button>
            </div>
          </div>
        </div>
      )}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

function MiniStat({ label, value }) {
  return (
    <div>
      <div className="t-faint" style={{ fontSize: 10, letterSpacing: ".03em", textTransform: "uppercase", marginBottom: 4 }}>{label}</div>
      <div className="mono t-text" style={{ fontSize: 16, fontWeight: 600 }}>{value}</div>
    </div>
  );
}

function Block({ label, text }) {
  return (
    <div style={{ marginTop: 12 }}>
      <div className="t-faint" style={{ fontSize: 11, marginBottom: 4 }}>{label}</div>
      <div className="t-text" style={{ fontSize: 13, lineHeight: 1.5, whiteSpace: "pre-wrap" }}>{text}</div>
    </div>
  );
}

function dirBadge(dir) {
  return dir === "short"
    ? { background: "rgba(247,90,104,0.13)", color: "#F75A68" }
    : { background: "rgba(33,201,151,0.13)", color: "#21C997" };
}

function SectionTitle({ icon, text }) {
  return (
    <div className="t-mute" style={{ fontSize: 12, marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}>
      {icon}{text}
    </div>
  );
}

function Breakdown({ title, icon, data }) {
  if (!data || data.length === 0) return null;
  const maxAbs = Math.max(...data.map((d) => Math.abs(d.pnl)), 1);
  return (
    <div>
      <SectionTitle icon={icon} text={title} />
      <div className="card" style={{ padding: "2px 6px" }}>
        {data.map((d) => {
          const pos = d.pnl >= 0;
          const w = Math.max(4, (Math.abs(d.pnl) / maxAbs) * 100);
          return (
            <div key={d.key} className="bd-row" style={{ padding: "11px 8px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 10, marginBottom: 7 }}>
                <span className="t-text" style={{ fontSize: 13, fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{d.key}</span>
                <span className={`mono ${pos ? "t-green" : "t-red"}`} style={{ fontSize: 13, fontWeight: 600, flexShrink: 0 }}>{fmtSigned(d.pnl)}</span>
              </div>
              <div className="bartrack"><div className="barfill" style={{ width: w + "%", background: pos ? "#21C997" : "#F75A68" }} /></div>
              <div className="t-faint" style={{ fontSize: 11, marginTop: 7 }}>
                {d.count} เทรด · ชนะ {d.winRate.toFixed(0)}%{d.avgR != null ? ` · ${d.avgR > 0 ? "+" : ""}${d.avgR.toFixed(2)}R` : ""}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
